<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFinder - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-S..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Theme Toggle Button -->
    <div class="theme-toggle">
        <button id="themeToggle" class="theme-btn" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>
    </div>

    <div class="login-container">
        <h1>EventFinder</h1>
        <p>Sign in to your account</p>

        <form id="loginForm" action="../php/login.php" method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group password-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-eye-slash toggle-password" id="toggleLoginPassword"></i>
                </div>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <p class="signup-link">
            Don't have an account? <a href="signup.html">Sign up</a>
        </p>
    </div>
    <script src="../js/validation.js"></script>
    <script>
        // Load saved theme on page load
        function loadTheme() {
            const savedTheme = localStorage.getItem('authTheme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fa-solid fa-sun';
            }
        }

        // Toggle theme
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            
            if (document.body.classList.contains('dark-mode')) {
                icon.className = 'fa-solid fa-sun';
                localStorage.setItem('authTheme', 'dark');
            } else {
                icon.className = 'fa-solid fa-moon';
                localStorage.setItem('authTheme', 'light');
            }
        }

        // Check for login error and show popup
        function checkLoginError() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                alert('Invalid email or password. Please try again.');
                // Clean up URL without reloading
                window.history.replaceState({}, document.title, 'login.html');
            }
        }

        // Initialize theme on load
        loadTheme();
        
        // Check for login errors when page loads
        window.addEventListener('DOMContentLoaded', checkLoginError);
    </script>
</body>
</html>
