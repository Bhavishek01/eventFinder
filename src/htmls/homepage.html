<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFinder - Kantipur City College</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>KCC eventFinder</h2>
            </div>
            <div class="nav-buttons">
                <div class="profile-dropdown">
                    <button class="btn btn-profile" onclick="toggleProfileMenu()">👤</button>
                    <div id="profileMenu" class="dropdown-menu">
                        <a href="#" onclick="goToProfile()">
                            <span>👤</span> Profile
                        </a>
                        <a href="#" onclick="toggleAppearance()">
                            <span>🎨</span> Appearance
                        </a>
                        <div id="themeOptions" class="theme-options" style="display: none;">
                            <a href="#" onclick="setTheme('light')">☀️ Light</a>
                            <a href="#" onclick="setTheme('dark')">🌙 Dark</a>
                        </div>
                        <hr>
                        <a href="#" onclick="logout()">
                            <span>🚪</span> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>eventFinder</h1>
            <p>BY alisha bhavishek riya</p>
        </div>
    </section>

    <!-- Events Container -->
    <section class="events-section">
        <div class="container">
            <h2 class="section-title">Upcoming Events</h2>
            <div class="events-grid" id="eventsGrid">
                <!-- Events will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLogin()">&times;</span>
            <h2>Sign In</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <p class="form-toggle">Don't have an account? <a href="#" onclick="switchToSignup()">Sign Up</a></p>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSignup()">&times;</span>
            <h2>Sign Up</h2>
            <form id="signupForm">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <select required>
                    <option value="">Select Type</option>
                    <option value="affiliated">Affiliated Student</option>
                    <option value="non-affiliated">Non-Affiliated</option>
                </select>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            <p class="form-toggle">Already have an account? <a href="#" onclick="switchToLogin()">Sign In</a></p>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventDetailsModal" class="modal modal-large">
        <div class="modal-content modal-content-large">
            <span class="close" onclick="closeEventDetailsModal()">&times;</span>
            <div id="eventDetailsContent">
                <!-- Event details will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="../js/homepage.js"></script>
</body>
</html>
