<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFinder - Kantipur City College</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2>Kantipur City College</h2>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-signin" onclick="login()">Sign In</button>
                <button class="btn btn-signup" onclick="signup()">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>eventFinder</h1>
            <p>BY alisha bhavishek riya</p>
        </div>
    </section>

    <!-- Events Container -->
    <section class="events-section">
        <div class="container">
            <h2 class="section-title">Upcoming Events</h2>
            <div class="events-grid" id="eventsGrid">
                <!-- Events will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLogin()">&times;</span>
            <h2>Sign In</h2>
            <form id="loginForm">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <p class="form-toggle">Don't have an account? <a onclick="switchToSignup()">Sign Up</a></p>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSignup()">&times;</span>
            <h2>Sign Up</h2>
            <form id="signupForm">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <select required>
                    <option value="">Select Type</option>
                    <option value="affiliated">Affiliated Student</option>
                    <option value="non-affiliated">Non-Affiliated</option>
                </select>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>
            <p class="form-toggle">Already have an account? <a onclick="switchToLogin()">Sign In</a></p>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventDetailsModal" class="modal">
        <div class="modal-content modal-content-large">
            <span class="close" onclick="closeEventDetailsModal()">&times;</span>
            <div id="eventDetailsContent">
                <!-- Event details will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
